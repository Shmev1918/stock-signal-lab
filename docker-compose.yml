services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: stock_signal_lab
      POSTGRES_USER: stock
      POSTGRES_PASSWORD: stock
    ports:
      - "5432:5432"
    volumes:
      - stock_signal_lab_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stock -d stock_signal_lab"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://stock:stock@db:5432/stock_signal_lab
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    image: node:24-alpine
    working_dir: /workspace/frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    volumes:
      - ./frontend:/workspace/frontend
      - frontend_node_modules:/workspace/frontend/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  stock_signal_lab_pg:
  frontend_node_modules:
